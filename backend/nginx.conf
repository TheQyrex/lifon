# nginx config for test.lifonmusic.lol
# Place at /etc/nginx/sites-available/lifonmusic and symlink:
#   ln -s /etc/nginx/sites-available/lifonmusic /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name test.lifonmusic.lol;

    # Redirect HTTP → HTTPS after certbot setup.
    # To get a cert: certbot --nginx -d test.lifonmusic.lol
    # After that, certbot replaces this block automatically.

    root /var/www/lifonmusic/frontend;
    index index.html;

    # ── Backend API ────────────────────────────────────────────────────────
    # Strip /api prefix before proxying to Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Support large uploads (audio files up to 50 MB)
        client_max_body_size 55M;

        # Disable proxy buffering for streaming media
        proxy_buffering    off;
    }

    # ── Frontend (SPA) ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /app.html;
    }

    # Serve static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|mp3|opus|ogg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
